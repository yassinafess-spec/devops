name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'k8s/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      run: |
        # On construit l'image avec le tag latest pour l'automatisme
        docker build -t ${{ secrets.DOCKER_USERNAME }}/quiz-app:latest ./app
        docker push ${{ secrets.DOCKER_USERNAME }}/quiz-app:latest

    - name: Deploy to Kubernetes via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.IP_MASTER }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. On s'assure que le déploiement utilise bien l'image latest
          sudo kubectl set image deployment/quiz-deployment quiz-container=${{ secrets.DOCKER_USERNAME }}/quiz-app:latest
          
          # 2. On force Kubernetes à retélécharger l'image même si le nom n'a pas changé
          sudo kubectl rollout restart deployment/quiz-deployment
          
          # 3. On attend que le redémarrage soit fini
          sudo kubectl rollout status deployment/quiz-deployment --timeout=120s
          
          echo "✅ L'application a été mise à jour automatiquement !"