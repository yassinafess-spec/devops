name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/quiz-app:latest ./app
        docker push ${{ secrets.DOCKER_USERNAME }}/quiz-app:latest

    - name: Deploy to Kubernetes via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.IP_MASTER }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Mettre à jour l'image et forcer le redéploiement
          sudo kubectl set image deployment/quiz-deployment quiz-container=${{ secrets.DOCKER_USERNAME }}/quiz-app:latest
          sudo kubectl rollout restart deployment/quiz-deployment
          sudo kubectl rollout status deployment/quiz-deployment --timeout=120s
          echo "✅ Déploiement automatique terminé avec succès!"

    - name: Verify deployment
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.IP_MASTER }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "📊 Statut du déploiement:"
          sudo kubectl get pods
          sudo kubectl get svc
          echo "🌐 Application disponible sur: http://${{ secrets.IP_MASTER }}:30001"