name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'k8s/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      run: |
        # FORCER la reconstruction sans cache
        docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/quiz-app:latest ./app
        docker push ${{ secrets.DOCKER_USERNAME }}/quiz-app:latest

    - name: Deploy to Kubernetes via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.IP_MASTER }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 1. On force la mise à jour de l'image
          sudo kubectl set image deployment/quiz-deployment quiz-container=${{ secrets.DOCKER_USERNAME }}/quiz-app:latest
          
          # 2. On force le redémarrage (le Rollout)
          sudo kubectl rollout restart deployment/quiz-deployment
          
          # 3. On attend que le déploiement soit terminé avant de vérifier
          sudo kubectl rollout status deployment/quiz-deployment --timeout=120s
          
          # 4. Vérification (on retire le -it pour que GitHub Actions ne plante pas)
          echo "📄 Titre actuel dans le serveur AWS :"
          POD_NAME=$(sudo kubectl get pods -l app=quiz-app -o jsonpath='{.items[0].metadata.name}')
          sudo kubectl exec $POD_NAME -- cat templates/index.html | grep "h1"
          
          echo "✅ L'application est à jour sur AWS !"