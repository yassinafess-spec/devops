<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz DevOps - Succès !</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; margin: 0;
        }
        .main-card {
            background: white; color: #2c3e50; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%; max-width: 600px; overflow: hidden;
        }
        .header { background: #764ba2; color: white; padding: 30px; text-align: center; }
        .content { padding: 30px; text-align: center; }
        .btn {
            background: #667eea; color: white; border: none; padding: 12px 30px;
            border-radius: 25px; cursor: pointer; font-size: 1em; margin-top: 20px;
        }
        .status-box { background: #f7f9fc; padding: 15px; border-radius: 10px; margin-top: 20px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="header">
            <h1>🚀 Quiz DevOps Opérationnel</h1>
            <p>Infrastructure AWS & Kubernetes</p>
        </div>
        <div class="content">
            <h2>Félicitations !</h2>
            <p>Ton pipeline CI/CD a fonctionné. L'application est maintenant déployée automatiquement.</p>
            
            <div class="status-box" id="api-status">
                Vérification de la connexion à l'API Flask...
            </div>

            <button class="btn" onclick="location.reload()">Rafraîchir la page</button>
        </div>
    </div>

    <script>
        // Test de connexion à l'API Flask
        fetch('/api/health')
            .then(res => res.json())
            .then(data => {
                document.getElementById('api-status').innerHTML = 
                    "✅ Serveur connecté : " + data.hostname + "<br>Statut : " + data.status;
            })
            .catch(err => {
                document.getElementById('api-status').innerHTML = "❌ Erreur : Impossible de joindre l'API Flask.";
            });
    </script>
</body>
</html>
