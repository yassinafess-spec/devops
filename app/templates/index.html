<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz DevOps Express</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #667eea; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        .quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 500px; }
        h1 { color: #764ba2; text-align: center; font-size: 1.5rem; }
        .question { font-size: 1.2rem; margin-bottom: 20px; font-weight: bold; min-height: 60px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn-opt { padding: 12px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; background: #f9f9f9; font-size: 1rem; transition: 0.3s; text-align: left; }
        .btn-opt:hover { background: #eef2ff; border-color: #667eea; }
        .correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background: #ff7675 !important; color: white; border-color: #d63031; }
        .score-box { text-align: center; margin-top: 20px; font-weight: bold; color: #666; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🚀 Mon Quiz DevOps</h1>
    
    <div id="game-zone">
        <div class="score-box" id="progress">Chargement...</div>
        <div class="question" id="question-text">Préparation du quiz...</div>
        <div class="options" id="options-box">
            <!-- Les boutons de réponse apparaîtront ici -->
        </div>
    </div>

    <div id="result-zone" class="hidden">
        <h2 style="text-align: center;">Quiz Terminé !</h2>
        <div class="score-box" id="final-score" style="font-size: 2rem; color: #667eea;"></div>
        <button onclick="location.reload()" style="width:100%; padding: 10px; margin-top:20px; cursor:pointer;">Rejouer</button>
    </div>
</div>

<script>
    let sessionId = "";

    // 1. Démarrer le quiz dès l'ouverture de la page
    window.onload = () => {
        fetch('/api/quiz/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ num_questions: 10 }) // On demande 10 questions
        })
        .then(res => res.json())
        .then(data => {
            sessionId = data.session_id;
            displayQuestion(data);
        });
    };

    // 2. Afficher une question
    function displayQuestion(data) {
        document.getElementById('progress').innerText = `Question ${data.progress}`;
        document.getElementById('question-text').innerText = data.question.question;
        
        const box = document.getElementById('options-box');
        box.innerHTML = ''; // On vide les anciens boutons

        data.question.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = option;
            btn.onclick = () => checkAnswer(index, btn);
            box.appendChild(btn);
        });
    }

    // 3. Vérifier la réponse
    function checkAnswer(index, btn) {
        // Désactiver tous les boutons pour éviter de recliquer
        const allBtns = document.querySelectorAll('.btn-opt');
        allBtns.forEach(b => b.disabled = true);

        fetch('/api/quiz/answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ session_id: sessionId, answer_index: index })
        })
        .then(res => res.json())
        .then(data => {
            // Feedback visuel (Vert ou Rouge)
            if (data.is_correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
            }

            // Attendre 1 seconde et passer à la suite
            setTimeout(() => {
                if (data.finished) {
                    showFinalResult(data);
                } else {
                    displayQuestion(data);
                }
            }, 1000);
        });
    }

    // 4. Afficher le score final
    function showFinalResult(data) {
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('result-zone').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${data.score} Points`;
    }
</script>

</body>
</html>
