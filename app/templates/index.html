<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz DevOps - Chaimaa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #00b894;
            --danger: #ff7675;
            --dark: #2d3436;
            --light: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .container {
            background: white; width: 100%; max-width: 800px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden; min-height: 500px; position: relative;
        }

        /* Header */
        .header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 1.5rem; letter-spacing: 1px; }

        /* Views */
        .view { padding: 30px; display: none; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Category Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .card {
            background: var(--light); border-radius: 12px; padding: 15px; text-align: center;
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card .icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .card .name { font-weight: 600; color: var(--dark); font-size: 0.9rem; }

        /* Quiz Area */
        .q-header { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--dark); font-weight: 600; }
        .question { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 25px; line-height: 1.4; }
        .options { display: grid; gap: 12px; }
        .option-btn {
            padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white;
            cursor: pointer; font-size: 1rem; text-align: left; transition: 0.2s;
        }
        .option-btn:hover { background: #eee; }
        .option-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }

        /* Results */
        .result-score { font-size: 4rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
        .btn-restart {
            background: var(--primary); color: white; border: none; padding: 12px 30px;
            border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 1rem; margin-top: 20px;
        }

        .loader { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>  QUIZZ </h1>
    </div>

    <!-- 1. Menu de sélection -->
    <div id="view-home" class="view active">
        <h2>Choisissez votre thème :</h2>
        <div id="categories-grid" class="grid">
            <!-- Rempli par JS -->
        </div>
    </div>

    <!-- 2. Zone de Jeu -->
    <div id="view-quiz" class="view">
        <div class="q-header">
            <span id="q-category">Informatique</span>
            <span id="q-progress">1/10</span>
            <span id="q-score">Score: 0</span>
        </div>
        <div id="question-text" class="question">Chargement...</div>
        <div id="options-container" class="options">
            <!-- Boutons ici -->
        </div>
    </div>

    <!-- 3. Résultats Finaux -->
    <div id="view-result" class="view" style="text-align: center;">
        <h2>Quiz Terminé !</h2>
        <div id="final-score" class="result-score">0</div>
        <p id="result-message">Bravo !</p>
        <button class="btn-restart" onclick="location.reload()">Rejouer</button>
    </div>
</div>

<script>
    let currentSession = null;
    let currentScore = 0;

    // Charger les catégories au démarrage
    window.onload = () => {
        fetch('/api/categories')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('categories-grid');
                data.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="icon">${cat.icon}</span>
                        <span class="name">${cat.name}</span>
                    `;
                    card.onclick = () => startQuiz(cat.name);
                    grid.appendChild(card);
                });
            });
    };

    // Démarrer un Quiz
    function startQuiz(category) {
        switchView('view-quiz');
        fetch('/api/quiz/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ categories: [category], num_questions: 10 })
        })
        .then(res => res.json())
        .then(data => {
            currentSession = data.session_id;
            displayQuestion(data);
        });
    }

    // Afficher la question
    function displayQuestion(data) {
        document.getElementById('q-category').innerText = data.question.category;
        document.getElementById('q-progress').innerText = data.progress;
        document.getElementById('question-text').innerText = data.question.question;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        data.question.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => submitAnswer(index, btn);
            container.appendChild(btn);
        });
    }

    // Envoyer la réponse
    function submitAnswer(index, btn) {
        // Bloquer les autres boutons
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        fetch('/api/quiz/answer', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ session_id: currentSession, answer_index: index })
        })
        .then(res => res.json())
        .then(data => {
            if (data.is_correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
            }
            
            document.getElementById('q-score').innerText = `Score: ${data.score}`;

            setTimeout(() => {
                if (data.finished) {
                    showResults(data);
                } else {
                    displayQuestion(data);
                }
            }, 1000);
        });
    }

    // Résultats finaux
    function showResults(data) {
        switchView('view-result');
        document.getElementById('final-score').innerText = data.score;
        document.getElementById('result-message').innerText = data.message;
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }
</script>

</body>
</html>
