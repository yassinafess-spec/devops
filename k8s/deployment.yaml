apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz-app
  template:
    metadata:
      labels:
        app: quiz-app
    spec:
      containers:
      - name: quiz-container
        image: chaimaa00dsbd/quiz-app:v1
                imagePullPolicy: Always # <--- AJOUTE CETTE LIGNE ICI

        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service
spec:
  type: NodePort
  selector:
    app: quiz-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30001
